apiVersion: v1
kind: Service
metadata:
  name: feature-api-service
  namespace: feature-pipeline
  labels:
    app: feature-api
spec:
  type: LoadBalancer
  selector:
    app: feature-api
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8000
    - name: grpc
      protocol: TCP
      port: 50051
      targetPort: 50051
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: feature-pipeline
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: feature-pipeline
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
