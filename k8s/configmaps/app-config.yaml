apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: feature-pipeline
data:
  redis_host: "redis-service"
  redis_port: "6379"
  postgres_host: "postgres-service"
  postgres_port: "5432"
  postgres_db: "features"
  postgres_user: "feature_user"
  kafka_bootstrap_servers: "kafka-service:9092"
  log_level: "INFO"
  env: "production"
  rest_port: "8000"
  grpc_port: "50051"
---
apiVersion: v1
kind: Secret
metadata:
  name: feature-pipeline-secrets
  namespace: feature-pipeline
type: Opaque
stringData:
  postgres_password: "CHANGE_ME_IN_PRODUCTION"
  redis_password: ""
