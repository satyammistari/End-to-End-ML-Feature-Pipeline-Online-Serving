feature_groups:
  - name: user_features
    entity_type: user
    description: "Real-time and batch features describing user behaviour"
    owner: "data-team"
    tags: ["user"]
    version: v1
    features:
      - name: transaction_count_24h
        type: integer
        computation_type: realtime
        description: "Number of transactions in last 24 hours"
        owner: "data-team"
        tags: ["user", "transaction", "realtime", "fraud"]
        ttl_seconds: 86400
        validation:
          min_value: 0
          max_value: 100000
          not_null: true

      - name: avg_transaction_amount_7d
        type: float
        computation_type: batch
        description: "Average transaction amount in last 7 days"
        owner: "data-team"
        tags: ["user", "transaction", "batch"]
        ttl_seconds: 86400
        validation:
          min_value: 0.0

      - name: std_transaction_amount_7d
        type: float
        computation_type: batch
        description: "Std deviation of transaction amounts in 7 days"
        owner: "data-team"
        tags: ["user", "transaction", "batch"]
        ttl_seconds: 86400
        validation:
          min_value: 0.0

      - name: transaction_velocity_1h
        type: float
        computation_type: realtime
        description: "Transactions per hour in last 60 minutes"
        owner: "data-team"
        tags: ["user", "transaction", "realtime", "fraud"]
        ttl_seconds: 3600
        validation:
          min_value: 0.0

      - name: unique_merchants_30d
        type: integer
        computation_type: batch
        description: "Count of unique merchants in last 30 days"
        owner: "data-team"
        tags: ["user", "merchant", "batch"]
        ttl_seconds: 86400
        validation:
          min_value: 0

      - name: user_lifetime_value
        type: float
        computation_type: batch
        description: "Total transaction value generated by the user"
        owner: "data-team"
        tags: ["user", "ltv", "batch"]
        ttl_seconds: 604800
        validation:
          min_value: 0.0

      - name: account_age_days
        type: integer
        computation_type: batch
        description: "Days since account creation"
        owner: "identity-team"
        tags: ["user", "account"]
        ttl_seconds: 86400
        validation:
          min_value: 0

      - name: kyc_verified
        type: boolean
        computation_type: realtime
        description: "KYC verification status"
        owner: "identity-team"
        tags: ["user", "compliance"]

      - name: typical_active_hours
        type: list
        computation_type: batch
        description: "Hours (0-23) the user typically transacts"
        owner: "data-team"
        tags: ["user", "temporal", "fraud"]
        ttl_seconds: 604800

  - name: transaction_features
    entity_type: transaction
    description: "Per-transaction raw and derived features"
    owner: "payments-team"
    tags: ["transaction"]
    version: v1
    features:
      - name: transaction_amount
        type: float
        computation_type: realtime
        description: "Raw transaction amount"
        owner: "payments-team"
        tags: ["transaction", "raw"]
        validation:
          min_value: 0.0
          max_value: 1000000.0

      - name: amount_zscore
        type: float
        computation_type: on_demand
        description: "Z-score vs user 7d distribution"
        owner: "data-team"
        tags: ["transaction", "fraud", "on_demand"]
        depends_on:
          - "user_features.avg_transaction_amount_7d"
          - "user_features.std_transaction_amount_7d"

      - name: transaction_currency
        type: string
        computation_type: realtime
        description: "ISO-4217 currency code"
        owner: "payments-team"
        tags: ["transaction", "raw"]
        validation:
          regex_pattern: "^[A-Z]{3}$"

      - name: merchant_category
        type: string
        computation_type: realtime
        description: "Merchant Category Code description"
        owner: "payments-team"
        tags: ["transaction", "merchant"]

      - name: is_online
        type: boolean
        computation_type: realtime
        description: "Whether transaction was made online"
        owner: "payments-team"
        tags: ["transaction", "channel"]

      - name: is_new_merchant
        type: boolean
        computation_type: on_demand
        description: "User has never transacted at this merchant"
        owner: "data-team"
        tags: ["transaction", "merchant", "fraud"]
        depends_on:
          - "user_features.known_merchant_ids"

      - name: merchant_category_frequency
        type: float
        computation_type: batch
        description: "Fraction of 30d transactions in this merchant category"
        owner: "data-team"
        tags: ["transaction", "merchant", "batch"]
        ttl_seconds: 86400
        validation:
          min_value: 0.0
          max_value: 1.0

      - name: is_high_risk_time
        type: boolean
        computation_type: on_demand
        description: "Transaction hour outside user's typical hours"
        owner: "data-team"
        tags: ["transaction", "temporal", "fraud"]
        depends_on:
          - "user_features.typical_active_hours"
